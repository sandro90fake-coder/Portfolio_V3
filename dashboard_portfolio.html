<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontobuch — Portfolio-Übersicht</title>
<style>
  :root{
    --paper:#F6F2E7;
    --leaf:#1B2A22;
    --leaf-soft:#36473D;
    --gold:#A9824C;
    --gold-soft:#E4D3AE;
    --pos:#3C7A5C;
    --neg:#A23E34;
    --panel:#FFFEFA;
    --rule:#E0D8C2;
    --muted:#7C7563;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--leaf);}
  body{font-family: ui-sans-serif, Arial, sans-serif; -webkit-font-smoothing:antialiased;}
  .serif{font-family: Georgia, "Iowan Old Style", "Times New Roman", serif;}
  .mono{font-family: ui-monospace, SFMono-Regular, Consolas, monospace;}

  .wrap{max-width:1140px;margin:0 auto;padding:30px 22px 90px;}

  /* ---- Cover / Header ---- */
  .cover{
    background:var(--leaf);
    color:var(--gold-soft);
    border-radius:3px;
    padding:30px 32px;
    display:grid;
    grid-template-columns:1fr auto;
    align-items:center;
    gap:24px;
    margin-bottom:24px;
    position:relative;
    overflow:hidden;
  }
  .cover::before{
    content:"";position:absolute;inset:0;
    background: repeating-linear-gradient(135deg, rgba(228,211,174,0.035) 0 2px, transparent 2px 26px);
    pointer-events:none;
  }
  .cover .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#B7A87E;margin-bottom:8px;}
  .cover h1{font-size:30px;margin:0 0 6px;color:#F6F2E7;font-weight:500;}
  .cover .meta{font-size:13px;color:#B7A87E;}

  /* Wax-seal style stamp showing total return */
  .seal{
    width:118px;height:118px;border-radius:50%;
    border:2.5px solid var(--gold-soft);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;
    animation: stampin .5s ease-out;
  }
  .seal::before{
    content:"";position:absolute;inset:8px;border:1px solid rgba(228,211,174,0.4);border-radius:50%;
  }
  .seal .pct{font-size:22px;font-weight:700;}
  .seal .pct.pos{color:#8FD6AE;}
  .seal .pct.neg{color:#E3998C;}
  .seal .lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#B7A87E;margin-top:3px;}
  @keyframes stampin{0%{transform:scale(1.5) rotate(-8deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}

  /* ---- Summary ledger row ---- */
  .ledger-row{
    display:grid;grid-template-columns:repeat(4,1fr);
    border:1px solid var(--rule);background:var(--panel);margin-bottom:24px;
  }
  .ledger-cell{padding:18px 20px;border-right:1px solid var(--rule);}
  .ledger-cell:last-child{border-right:none;}
  .ledger-cell .label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .ledger-cell .value{font-size:24px;}
  .ledger-cell .value.pos{color:var(--pos);}
  .ledger-cell .value.neg{color:var(--neg);}

  /* ---- Panels ---- */
  .panel{background:var(--panel);border:1px solid var(--rule);margin-bottom:22px;}
  .panel-head{display:flex;justify-content:space-between;align-items:baseline;padding:16px 20px;border-bottom:1px solid var(--rule);}
  .panel-head h2{font-size:15px;margin:0;font-weight:600;}
  .panel-head .note{font-size:12px;color:var(--muted);}
  .panel-body{padding:16px 20px 20px;}

  /* ---- Two-column layout: chart + allocation ---- */
  .row2{display:grid;grid-template-columns:2fr 1fr;gap:22px;}
  @media (max-width:880px){ .row2{grid-template-columns:1fr;} }

  canvas{display:block;width:100%;}

  /* ---- Allocation bars (ledger style, not pie) ---- */
  .alloc-item{margin-bottom:14px;}
  .alloc-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
  .alloc-bar-bg{height:8px;background:var(--gold-soft);border-radius:2px;overflow:hidden;}
  .alloc-bar-fill{height:100%;background:var(--leaf);border-radius:2px;}

  /* ---- Holdings table ---- */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    padding:9px 10px;border-bottom:1.5px solid var(--leaf);}
  tbody td{padding:11px 10px;border-bottom:1px solid var(--rule);}
  tbody tr:hover{background:#FBF7EC;}
  td.num{text-align:right;}
  .pos{color:var(--pos);} .neg{color:var(--neg);}
  .asset-tag{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--rule);border-radius:2px;padding:2px 7px;}

  /* ---- Dividend timeline ---- */
  .dividend-list{list-style:none;margin:0;padding:0;}
  .dividend-list li{
    display:grid;grid-template-columns:90px 1fr auto;gap:14px;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--rule);font-size:13px;
  }
  .dividend-list li:last-child{border-bottom:none;}
  .div-date{color:var(--muted);}
  .div-amt{font-weight:600;color:var(--pos);}

  footer{font-size:11px;color:var(--muted);margin-top:8px;text-align:center;}
  .status{font-size:12px;color:var(--muted);text-align:center;margin-bottom:14px;}
  .status.err{color:var(--neg);}

  @media (max-width:780px){
    .ledger-row{grid-template-columns:repeat(2,1fr);}
    .cover{grid-template-columns:1fr;text-align:center;}
    .seal{margin:0 auto;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="cover">
    <div>
      <div class="eyebrow">Privates Kontobuch</div>
      <h1 class="serif" id="coverTitle">Portfolio-Übersicht</h1>
      <div class="meta mono" id="coverMeta">— Positionen · Stand —</div>
    </div>
    <div class="seal">
      <div class="pct mono" id="sealPct">—</div>
      <div class="lbl">Gesamtrendite</div>
    </div>
  </div>

  <div class="status" id="status">Lade Portfolio-Daten …</div>

  <div class="ledger-row" id="summaryRow"></div>

  <div class="row2">
    <div class="panel">
      <div class="panel-head">
        <h2 class="serif">Wertentwicklung</h2>
        <div class="note mono" id="perfRange">—</div>
      </div>
      <div class="panel-body"><canvas id="perfChart" height="280"></canvas></div>
    </div>

    <div class="panel">
      <div class="panel-head"><h2 class="serif">Allokation</h2></div>
      <div class="panel-body" id="allocBody"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head"><h2 class="serif">Positionen</h2></div>
    <div class="panel-body">
      <table>
        <thead><tr>
          <th>Symbol</th><th>Klasse</th><th class="num">Stück</th>
          <th class="num">Kurs</th><th class="num">Marktwert</th><th class="num">G&amp;V</th><th class="num">Rendite</th>
        </tr></thead>
        <tbody id="holdingsBody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h2 class="serif">Dividenden</h2>
      <div class="note mono" id="divTotal">—</div>
    </div>
    <div class="panel-body"><ul class="dividend-list" id="divList"></ul></div>
  </div>

  <footer>Datenquelle: <span class="mono">output/portfolio_data.json</span> · generiert von <span class="mono">portfolio_tracker.py</span> via yfinance</footer>
</div>

<script>
const fmtMoney = (n, ccy) => (n>=0?'':'−') + 'CHF '.replace('CHF', ccy||'CHF') + Math.abs(n).toLocaleString('de-CH',{maximumFractionDigits:0});
const fmtNum = n => n.toLocaleString('de-CH',{maximumFractionDigits:2});
const fmtPct = n => (n>=0?'+':'') + n.toFixed(2) + ' %';

/* ---------------------------------------------------------------
   Fallback-Demodaten, falls portfolio_data.json nicht erreichbar
   ist (z.B. beim direkten Doppelklick-Öffnen der Datei ohne
   lokalen Server). Struktur entspricht exakt dem echten Output
   von portfolio_tracker.py.
---------------------------------------------------------------- */
function buildFallbackData(){
  const N = 420;
  const series = [];
  let v = 38000;
  const start = new Date('2024-06-01');
  for(let i=0;i<N;i++){
    const d = new Date(start); d.setDate(d.getDate()+i);
    v += (Math.sin(i/24)*55) + (i*1.6) + (Math.random()-0.45)*120;
    series.push({date: d.toISOString().slice(0,10), value: Math.round(v)});
  }
  const positions = [
    {ticker:"AAPL", asset_class:"Aktie", currency:"USD", shares:10, current_price:213.4, market_value_base:1932, cost_basis_native:1650, pnl_abs_native:484, pnl_pct:29.3, dividends_received_native:21.4},
    {ticker:"MSFT", asset_class:"Aktie", currency:"USD", shares:6, current_price:441.2, market_value_base:2403, cost_basis_native:1740, pnl_abs_native:907, pnl_pct:52.1, dividends_received_native:38.7},
    {ticker:"VWRL.SW", asset_class:"ETF", currency:"CHF", shares:25, current_price:118.9, market_value_base:2973, cost_basis_native:2462, pnl_abs_native:511, pnl_pct:20.7, dividends_received_native:64.2},
    {ticker:"VUSA.SW", asset_class:"ETF", currency:"CHF", shares:15, current_price:95.1, market_value_base:1427, cost_basis_native:1173, pnl_abs_native:254, pnl_pct:21.6, dividends_received_native:18.5},
    {ticker:"BTC-USD", asset_class:"Krypto", currency:"USD", shares:0.15, current_price:97500, market_value_base:13130, cost_basis_native:4200, pnl_abs_native:10905, pnl_pct:259.6, dividends_received_native:0},
    {ticker:"NESN.SW", asset_class:"Aktie", currency:"CHF", shares:20, current_price:84.3, market_value_base:1686, cost_basis_native:2040, pnl_abs_native:-354, pnl_pct:-17.4, dividends_received_native:62.0},
  ];
  const allocation = {};
  positions.forEach(p=>{ allocation[p.asset_class] = (allocation[p.asset_class]||0) + p.market_value_base; });
  const total_market_value = positions.reduce((a,p)=>a+p.market_value_base,0);
  const total_cost_basis = positions.reduce((a,p)=>a+p.cost_basis_native,0);
  const dividend_events = [
    {ticker:"VWRL.SW", date:"2026-06-15", amount_per_share:0.42, amount_total:10.5},
    {ticker:"NESN.SW", date:"2026-04-18", amount_per_share:3.10, amount_total:62.0},
    {ticker:"MSFT", date:"2026-03-12", amount_per_share:0.83, amount_total:4.98},
    {ticker:"AAPL", date:"2026-02-09", amount_per_share:0.26, amount_total:2.6},
  ];
  return {
    generated_at: new Date().toISOString(),
    base_currency: "CHF",
    summary: {
      total_market_value: Math.round(total_market_value),
      total_cost_basis: Math.round(total_cost_basis),
      total_pnl_abs: Math.round(total_market_value-total_cost_basis),
      total_pnl_pct: ((total_market_value-total_cost_basis)/total_cost_basis*100),
      total_dividends_received: positions.reduce((a,p)=>a+p.dividends_received_native,0),
      position_count: positions.length
    },
    allocation, positions, dividend_events, performance_series: series,
    _isFallback: true
  };
}

async function loadData(){
  try{
    const res = await fetch('output/portfolio_data.json', {cache:'no-store'});
    if(!res.ok) throw new Error('not found');
    const json = await res.json();
    document.getElementById('status').style.display='none';
    return json;
  }catch(e){
    const el = document.getElementById('status');
    el.textContent = 'Keine echten Daten gefunden (portfolio_data.json) — zeige Beispieldaten. Führe portfolio_tracker.py aus und starte einen lokalen Server.';
    el.classList.add('err');
    return buildFallbackData();
  }
}

function render(data){
  const ccy = data.base_currency;
  const s = data.summary;

  document.getElementById('coverMeta').textContent =
    `${s.position_count} Positionen · Stand ${new Date(data.generated_at).toLocaleDateString('de-CH')}`;

  const seal = document.getElementById('sealPct');
  seal.textContent = fmtPct(s.total_pnl_pct);
  seal.classList.add(s.total_pnl_pct>=0?'pos':'neg');

  const rows = [
    {label:'Depotwert', value: fmtMoney(s.total_market_value, ccy), cls:''},
    {label:'Einstand', value: fmtMoney(s.total_cost_basis, ccy), cls:''},
    {label:'Gewinn / Verlust', value: fmtMoney(s.total_pnl_abs, ccy), cls: s.total_pnl_abs>=0?'pos':'neg'},
    {label:'Dividenden erhalten', value: fmtMoney(s.total_dividends_received, ccy), cls:'pos'},
  ];
  const summaryRow = document.getElementById('summaryRow');
  rows.forEach(r=>{
    const div = document.createElement('div');
    div.className='ledger-cell';
    div.innerHTML = `<div class="label">${r.label}</div><div class="value mono ${r.cls}">${r.value}</div>`;
    summaryRow.appendChild(div);
  });

  // Allocation
  const allocBody = document.getElementById('allocBody');
  const totalAlloc = Object.values(data.allocation).reduce((a,b)=>a+b,0);
  Object.entries(data.allocation).sort((a,b)=>b[1]-a[1]).forEach(([cls,val])=>{
    const pct = (val/totalAlloc*100);
    const item = document.createElement('div');
    item.className='alloc-item';
    item.innerHTML = `
      <div class="alloc-top"><span>${cls}</span><span class="mono">${pct.toFixed(1)} %</span></div>
      <div class="alloc-bar-bg"><div class="alloc-bar-fill" style="width:${pct}%"></div></div>`;
    allocBody.appendChild(item);
  });

  // Holdings table
  const tbody = document.getElementById('holdingsBody');
  data.positions.sort((a,b)=>b.market_value_base-a.market_value_base).forEach(p=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="mono">${p.ticker}</td>
      <td><span class="asset-tag">${p.asset_class}</span></td>
      <td class="num mono">${fmtNum(p.shares)}</td>
      <td class="num mono">${fmtNum(p.current_price)} ${p.currency}</td>
      <td class="num mono">${fmtMoney(p.market_value_base, ccy)}</td>
      <td class="num mono ${p.pnl_abs_native>=0?'pos':'neg'}">${fmtMoney(p.pnl_abs_native, p.currency)}</td>
      <td class="num mono ${p.pnl_pct>=0?'pos':'neg'}">${fmtPct(p.pnl_pct)}</td>`;
    tbody.appendChild(tr);
  });

  // Dividends
  document.getElementById('divTotal').textContent =
    'Gesamt: ' + fmtMoney(s.total_dividends_received, ccy);
  const divList = document.getElementById('divList');
  data.dividend_events.forEach(d=>{
    const li = document.createElement('li');
    li.innerHTML = `
      <span class="div-date mono">${new Date(d.date).toLocaleDateString('de-CH')}</span>
      <span>${d.ticker} — ${fmtNum(d.amount_per_share)} pro Anteil</span>
      <span class="div-amt mono">+${fmtNum(d.amount_total)}</span>`;
    divList.appendChild(li);
  });

  drawPerfChart(data.performance_series, ccy);
}

function drawPerfChart(series, ccy){
  const canvas = document.getElementById('perfChart');
  const dpr = window.devicePixelRatio||1;
  const w = canvas.clientWidth, h=280;
  canvas.width=w*dpr; canvas.height=h*dpr;
  const ctx = canvas.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);

  const padL=62,padR=10,padT=14,padB=24;
  const vals = series.map(d=>d.value);
  const minV=Math.min(...vals)*0.97, maxV=Math.max(...vals)*1.03;
  const xs = i => padL + i/(series.length-1)*(w-padL-padR);
  const ys = v => padT + (1-(v-minV)/(maxV-minV))*(h-padT-padB);

  ctx.strokeStyle='#E0D8C2'; ctx.font='11px ui-monospace,monospace'; ctx.fillStyle='#7C7563';
  for(let g=0; g<=3; g++){
    const v = minV+(maxV-minV)*g/3, y=ys(v);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
    ctx.fillText(ccy+' '+v.toFixed(0), 4, y+3);
  }

  ctx.beginPath(); ctx.moveTo(xs(0), h-padB);
  series.forEach((d,i)=>ctx.lineTo(xs(i), ys(d.value)));
  ctx.lineTo(xs(series.length-1), h-padB); ctx.closePath();
  ctx.fillStyle='rgba(60,122,92,0.10)'; ctx.fill();

  ctx.beginPath();
  series.forEach((d,i)=>{ const x=xs(i),y=ys(d.value); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
  ctx.strokeStyle='#3C7A5C'; ctx.lineWidth=1.8; ctx.stroke();

  // year labels
  let lastYear=null;
  ctx.fillStyle='#7C7563';
  series.forEach((d,i)=>{
    const y = new Date(d.date).getFullYear();
    if(y!==lastYear){ ctx.fillText(y, xs(i), h-6); lastYear=y; }
  });

  document.getElementById('perfRange').textContent =
    series[0].date + '  →  ' + series[series.length-1].date;
}

loadData().then(render);
window.addEventListener('resize', ()=>{ /* re-render on resize handled by next load in simple demo */ });
</script>
</body>
</html>
