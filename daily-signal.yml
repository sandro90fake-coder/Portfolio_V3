name: Daily Update & Publish

on:
  schedule:
    - cron: "30 22 * * 1-5"   # Werktags 22:30 UTC, nach US-Marktschluss
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Trading-Strategie ausführen
        run: python strategy.py --ticker AAPL --start 2015-01-01 --capital 10000 --risk 0.01

      - name: Portfolio-Tracker ausführen
        run: python portfolio_tracker.py

      - name: Ergebnisse committen (löst GitHub Pages Rebuild aus)
        run: |
          git config --global user.name "trading-bot"
          git config --global user.email "trading-bot@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "Auto-Update: Dashboards $(date +'%Y-%m-%d')"
          git push
